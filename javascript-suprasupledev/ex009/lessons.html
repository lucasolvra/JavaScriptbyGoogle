<!DOCTYPE html>
<html>
  <head>
    <title>Lessons</title>
  </head>
  <body>
    <button onclick="
      playGame('heads') 
    ">heads</button>
    <button onclick="
      playGame('tails')
    ">tails</button>
    <p class="js-player-chose"></p>
    <script>
      const choseElement = document.querySelector('.js-player-chose');
      function playGame(move) {
        if (move === 'heads') {
          choseElement.innerHTML = `You chose: ${move}`;
        } else if (move === 'tails') {
          choseElement.innerHTML = `You chose: ${move}`;
        }
      }
    </script>
  </body>
</html>
