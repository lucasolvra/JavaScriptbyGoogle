<!DOCTYPE html>
<html>
  <head>
    <title>
      Calculator
    </title>
  </head>
  <body>
    <p>Calculator</p>
    <p>
      <button onclick="
        updateCalculation('1');
      ">1</button>
      <button onclick="
        updateCalculation('2');
      ">2</button>
      <button onclick="
        updateCalculation('3');
      ">3</button>
      <button onclick="
        updateCalculation(' + ');
      ">+</button>
    </p>
    <p>
      <button onclick="
        updateCalculation('4');
        ">4</button>
      <button onclick="
        updateCalculation('5');
      ">5</button>
      <button onclick="
        updateCalculation('6');
      ">6</button>
      <button onclick="
        updateCalculation(' - ');
      ">-</button>
    </p>
    <p>
      <button onclick="
        updateCalculation('7');
        ">7</button>
      <button onclick="
        updateCalculation('8');
      ">8</button>
      <button onclick="
        updateCalculation('9');
      ">9</button>
      <button onclick="
        updateCalculation(' * ');
      ">*</button>
    </p>
    <p>
      <button onclick="
        updateCalculation('0');
        ">0</button>
      <button onclick="
        updateCalculation('.');
      ">.</button>
      <button onclick="
        calculation = eval(calculation);
        calculationText()

        localStorage.setItem('calculation', calculation);
      ">=</button>
      <button onclick="
        updateCalculation(' / ');
      ">/</button>
    </p>
    <p>
      <button onclick="
        calculation = '';
        document.querySelector('.js-update-calculator').innerHTML = `Cleared!`;

        localStorage.setItem('calculation', calculation);
        ">Clear</button>
    </p>

    <p class="js-update-calculator"></p>

    <script>
      let calculation = localStorage.getItem('calculation' || '');

      calculationText()

      function updateCalculation(input) {
        calculation += input;
        calculationText()
        //console.log(calculation);

        localStorage.setItem('calculation', calculation);
      }

      function calculationText() {
        document.querySelector('.js-update-calculator').innerHTML = calculation;
      }
    </script>
  </body>
</html>
