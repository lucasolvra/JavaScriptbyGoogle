<!DOCTYPE html>
<html>
  <header>
    <title>Buttons</title>
    <style>
        #yellow {
          background-color: yellow;
        }

        #orange {
          background-color: orange;
        }
    </style>
  </header>
  <body>
    <p>Adults Plain Cotton T-shirt</p>
    <p>Price: $7.99</p>
    <button id="yellow" onclick="add()">Add to cart</button>
    <button id="orange" onclick="buy()">Buy now</button>

    <script>
      function add() {
        alert('Added');
      }

      function buy(){
        console.log('Loading...');
        alert('Purchased');
      }
    </script>
  </body>
</html>
