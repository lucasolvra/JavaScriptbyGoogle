<!DOCTYPE html>
<html>
  <head>
    <title>Exercises</title>
    <style>
      body {
        font-family: Arial;
      }

      .cart-button {
        background-color: rgb(255, 216, 20);
        padding: 10px 50px;
        border: none;
        border-radius: 20px;
      }

      .request-button {
        background-color: black;
        color: white;
        padding: 15px 25px;
        border: none;
        border-radius: 5px;
        font-weight: bold;
      }

      .schedule-button {
        background-color: rgb(230, 230, 230);
        color: black;
        padding: 15px 25px;
        border: none;
        border-radius: 5px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <button class="cart-button">Add to Cart</button>
    <p></p>
    <button class="request-button">Request now</button>
    <button class="schedule-button">Schedule for later</button>
  </body>
</html>
