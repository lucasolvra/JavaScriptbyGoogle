<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <title>Advanced Functions</title>
  </head>
  <body>
    <script>
      greeting(); //hoisting

      function greeting() {
        console.log('Hello!');
      }
      greeting();

      const num = 2;
      const function1 = function() { //anonymous function
        console.log('hello2');
      };

      console.log(function1);
      console.log(typeof function1);
      function1();

      const object1 = {
        num: 2,
        fun: function() {
          console.log('hello3');
        }
      };
      object1.fun();
      
      //Passing value into a function
      function display(param) {
        console.log(param);
      }
      display(2);

      //Passing a function into a function
      function run(param) {
        param();
      }
      run(function() {
        console.log('hello4')
      });
    </script>
  </body>
</html>
