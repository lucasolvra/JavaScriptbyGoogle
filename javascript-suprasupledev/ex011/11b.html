<!DOCTYPE html>
<html>
  <head>
    <title>Arrays</title>
  </head>
  <body>
    <script>
      function getLastValue(array) {
        const lastIndex = array.length - 1;
        return array[lastIndex];
      }

      console.log(getLastValue([1, 20, 22, 24, 5]));
      console.log(getLastValue(['hi', 'good', 'job']));

      //console.log(array);
    </script>
  </body>
</html>
