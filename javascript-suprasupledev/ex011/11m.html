<!DOCTYPE html>
<html>
  <head>
    <title>Arrays & Loops</title>
  </head>
  <body>
    <script>
      function countWords(words) {
        let count = {
          apple: 0,
          grape: 0
        }

        for (i = 0; i < words.length; i++) {
          const value = words[i];
          if (value === 'apple') {
            count.apple++;
          } else if (value === 'grape') {
            count.grape++;
          }
        }

        return count;

      }

      console.log(countWords(['apple', 'grape', 'apple', 'apple']));
    </script>
  </body>
</html>
