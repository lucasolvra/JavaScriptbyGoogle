      //DESTRUCTURING
      //Tira o primeiro e segundo valor do array e salva na variável
      const [firstValue, secondValue] = [1, 2, 3];

      //break; sai do loop antes de finalizar
      //continue; pula 1 interação do loop

      //Em "While loop", 'continue' vai pular o increment step, gerando um loop infinito, então deve ser adicionado um increment step antes do 'continue'


      function doubleArray(nums) {
        const numsDoubled = [];

        for (let i = 0; i < nums.length; i++) {
          const num = nums[i];
          if (num === 0) {
            return numsDoubled;
          }
          numsDoubled.push(num * 2);
        }

        return numsDoubled;
      }

      console.log(doubleArray([1, 1, 3]));
      console.log(doubleArray([2, 2, 5, 0, 5]));
