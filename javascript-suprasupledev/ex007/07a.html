<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions</title>
</head>
<body>
    <script>
        function greet(name) {
            //name === undefined ? console.log('Hi there!') : console.log(`Hello, ${name}!`)
            //console.log(`Hello, ${name}!`)

            if (!name) {
                console.log('Hi there!');
            } else {
                console.log(`Hello, ${name}!`);
            }
        }

        greet();
    </script>
</body>
</html>
